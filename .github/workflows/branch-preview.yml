name: Branch preview

on:
  push:
    branches-ignore:
      - master
      - gh-pages
    paths:
      - 'financials-hub/**'

concurrency:
  group: branch-preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      pages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: financials-hub/package-lock.json

      - name: Install Dependencies
        working-directory: financials-hub
        run: npm ci

      - name: Compute branch slug
        id: branch
        run: |
          BRANCH="${{ github.ref_name }}"
          SLUG=$(echo "$BRANCH" | sed 's/[^a-zA-Z0-9_.-]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')
          REPO="${{ github.event.repository.name }}"
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"
          echo "name=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "base_path=/$REPO/branches/$SLUG/" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: financials-hub
        run: npm run build -- --base=${{ steps.branch.outputs.base_path }}

      - name: Checkout gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy build to branch subdirectory
        run: |
          rm -rf gh-pages/branches/${{ steps.branch.outputs.slug }}
          mkdir -p gh-pages/branches/${{ steps.branch.outputs.slug }}
          cp -r financials-hub/dist/. gh-pages/branches/${{ steps.branch.outputs.slug }}/

      - name: Push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add branches/${{ steps.branch.outputs.slug }}
          git diff --staged --quiet || git commit -m "Deploy branch ${{ steps.branch.outputs.name }} preview"
          git pull --rebase origin gh-pages
          git push origin gh-pages

      - name: Comment on PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.branch.outputs.name }}';
            const slug = '${{ steps.branch.outputs.slug }}';
            const repo = context.repo;
            const { data: prs } = await github.rest.pulls.list({
              owner: repo.owner,
              repo: repo.repo,
              state: 'open',
              head: `${repo.owner}:${branch}`
            });
            if (prs.length === 0) return;
            const pr = prs[0];
            const previewUrl = `https://${repo.owner}.github.io/${repo.repo}/branches/${slug}/`;
            const marker = '<!-- branch-deploy-preview -->';
            const body = `${marker}\n**Preview:** ${previewUrl}`;
            const { data: comments } = await github.rest.issues.listComments({
              owner: repo.owner,
              repo: repo.repo,
              issue_number: pr.number
            });
            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: repo.owner,
                repo: repo.repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: repo.owner,
                repo: repo.repo,
                issue_number: pr.number,
                body
              });
            }
