<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prism — Trimble Financials</title>

    <!-- Modus Icons font preloads -->
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/@trimble-oss/modus-icons@1/dist/modus-outlined/fonts/modus-icons.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="https://cdn.jsdelivr.net/npm/@trimble-oss/modus-icons@1/dist/modus-solid/fonts/modus-icons.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="stylesheet" href="/modus-web-components/modus-icons.css" />

    <!-- Google Fonts: Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Inline theme bootstrap: prevents flash of unstyled content -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('modus-theme-config');
          var config = stored ? JSON.parse(stored) : null;
          var mode = (config && config.mode) ? config.mode : 'light';
          document.documentElement.setAttribute(
            'data-theme',
            mode === 'dark' ? 'modus-modern-dark' : 'modus-modern-light'
          );
          document.documentElement.setAttribute('data-mode', mode);
          document.documentElement.classList.remove('light', 'dark');
          document.documentElement.classList.add(mode);
          if (!stored) {
            localStorage.setItem(
              'modus-theme-config',
              JSON.stringify({ theme: 'modus-modern', mode: mode })
            );
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
