<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: store the path and redirect to root
      var repo = '/Trimble-Financials';
      var l = window.location;
      var path = l.pathname.slice(repo.length) || '/';
      var search = l.search;
      var hash = l.hash;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        repo + '/?p=' + encodeURIComponent(path + search) + hash
      );
    </script>
  </head>
</html>
